<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Personal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Hola, soy Alberto 👋</h1>
        <p>Desarrollador web en formación</p>
        <p id="contador">Clics: 0</p>
        <button id="resetBtn">Reiniciar contador</button>
    </header>

    <section>
        <h2>Sobre mí</h2>
        <section>
            <h2>Mis habilidades</h2>
            <div class="habilidad">
                <span>HTML</span>
                <div class="barra">
                    <div class="progreso" data-nivel="80"></div>
                </div>
            </div>
            <div class="habilidad">
                <span>CSS</span>
                <div class="barra">
                    <div class="progreso" data-nivel="70"></div>
                </div>
            </div>
            <div class="habilidad">
                <span>JavaScript</span>
                <div class="barra">
                    <div class="progreso" data-nivel="60"></div>
                </div>
            </div>
    </section>
        <p>Soy nuevo en la programación y estoy aprendiendo desarrollo web fullstack y está muy bueno.</p>
    </section>

    <section>
        <h2>Mis redes</h2>
        <ul>
            <li><a href="https://google.com">GitHub</a></li>
            <li><a href="#">LinkedIn</a></li>
        </ul>
    </section>

    <section>
        <h2>Contáctame</h2>
        <form id="formulario">
            <input type="text" id="nombre" placeholder="Tu nombre" required>
            <input type="email" id="email" placeholder="Tu email" required>
            <textarea id="mensaje" placeholder="Tu mensaje" rows="4" required></textarea>
            <button type="submit">Enviar mensaje</button>
        </form>
        <p id="respuesta"></p>
    </section>


    <footer>
        <p>Hecho con ❤️ y VS Code</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
